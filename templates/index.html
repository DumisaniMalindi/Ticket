<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Enterprise AI Ticket Classification System</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <div class="main-card">

        <h1 class="page-title">
            Enterprise AI Ticket Classification System
        </h1>

        <p class="subtitle">
            HR • IT • Finance • Operations
        </p>

        <textarea
            id="ticketText"
            placeholder="Describe your issue here...">
        </textarea>

        <button
            onclick="classifyTicket()"
            class="btn-classify">

            Classify Ticket

        </button>

        <a href="/dashboard" class="btn-admin">
            Admin Dashboard
        </a>

        <div class="result-section">

            <div class="result-card category-card">

                <span class="result-label">
                    Category:
                </span>

                <span
                    id="categoryResult"
                    class="result-value">

                    Waiting...

                </span>

            </div>

            <div class="result-card priority-card">

                <span class="result-label">
                    Priority:
                </span>

                <span
                    id="priorityResult"
                    class="result-value">

                    Waiting...

                </span>

            </div>

        </div>

        <div class="footer">
            Service Desk by Dumisani,Mbuyelo & Kelebogile
        </div>

    </div>

</div>

<script>

async function classifyTicket() {

    const text =
        document.getElementById("ticketText").value;

    const response = await fetch("/classify", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({ text })

    });

    const data = await response.json();

    document.getElementById("categoryResult").innerHTML =
        data.predicted_category;

    document.getElementById("priorityResult").innerHTML =
        data.priority;
}

</script>

</body>
</html>
